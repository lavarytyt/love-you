<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Choupinette 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(120deg,#ffc0cb,#ffffff);
    overflow:hidden;
}

.container{
    text-align:center;
    margin-top:18vh;
    animation:fade 2s ease;
}

h1{color:#ff2f7d;}
p{font-size:18px;}

input{
    padding:15px;
    width:340px;
    border-radius:30px;
    border:none;
    font-size:16px;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 35px;
    border:none;
    border-radius:30px;
    background:#ff5fa2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#error{
    margin-top:12px;
    color:#ff3366;
    font-weight:bold;
}

#love{
    display:none;
}

.photo-card{
    width:240px;
    margin:20px auto;
    padding:15px;
    border-radius:25px;
    background:white;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    opacity:0;
    transform:translateY(30px);
    animation:show 1.5s ease forwards;
}

.photo-card img{
    width:100%;
    border-radius:20px;
}

.photo-card p{
    margin-top:10px;
    font-size:18px;
    color:#ff2f7d;
    font-weight:bold;
}

.heart{
    position:absolute;
    animation:float 6s linear infinite;
    font-size:20px;
    pointer-events:none;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

@keyframes fade{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes show{
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container" id="question">
    <h1>💌 Question pour Choupinette 💌</h1>
    <p><strong>KISA DEPI VARY WÈ LI TONBE DEPALE ?</strong></p>

    <input type="text" id="answer" placeholder="Écris la réponse 💕">
    <br>
    <button onclick="checkAnswer()">Valider 💖</button>

    <div id="error"></div>
</div>

<div class="container" id="love">
    <h1>Choupinette 💗</h1>

    <div class="photo-card" style="animation-delay:0.5s">
        <img src="photo1.jpg">
        <p>I love you ❤️</p>
    </div>

    <div class="photo-card" style="animation-delay:2s">
        <img src="photo2.jpg">
        <p>I love you ❤️</p>
    </div>

    <div class="photo-card" style="animation-delay:3.5s">
        <img src="photo3.jpg">
        <p>I love you ❤️</p>
    </div>
</div>

<script>
const goodAnswer = "fraises";

function checkAnswer(){
    let user = document.getElementById("answer").value
        .toLowerCase()
        .trim()
        .replace(/\s+/g," ");

    if(user === goodAnswer){
        document.getElementById("question").style.display="none";
        document.getElementById("love").style.display="block";
        hearts();
    } else {
        document.getElementById("error").innerText = "Eseye ankò bbm 💕";
    }
}

function hearts(){
    const emojis = ["💗","🤍","💋","💘"];
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        h.style.left = Math.random()*100+"vw";
        h.style.fontSize = (20+Math.random()*25)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}
</script>

</body>
</html>
