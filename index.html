<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Choupinette 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(120deg,#ffc0cb,#ffffff);
    overflow:hidden;
}

.container{
    text-align:center;
    margin-top:15vh;
}

h1{color:#ff2f7d;}
p{font-size:18px;}

input{
    padding:15px;
    width:340px;
    border-radius:30px;
    border:none;
    font-size:16px;
    outline:none;
}

button{
    margin-top:15px;
    padding:12px 35px;
    border:none;
    border-radius:30px;
    background:#ff5fa2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#error{
    margin-top:12px;
    color:#ff3366;
    font-weight:bold;
}

#love{
    display:none;
    position:relative;
    height:60vh;
}

.photo-card{
    width:280px;
    margin:0 auto;
    padding:15px;
    border-radius:25px;
    background:white;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%) translateY(100px);
    opacity:0;
}

.photo-card img{
    width:100%;
    border-radius:20px;
}

.photo-card p{
    margin-top:10px;
    font-size:18px;
    color:#ff2f7d;
    font-weight:bold;
}

.heart{
    position:absolute;
    animation:float 6s linear infinite;
    font-size:20px;
    pointer-events:none;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

@keyframes show{
    0% {opacity:0; transform:translateY(100px);}
    50% {opacity:1; transform:translateY(0);}
    100% {opacity:0; transform:translateY(-50px);}
}
</style>
</head>

<body>

<div class="container" id="question">
    <h1>💌 Question pour Choupinette 💌</h1>
    <p><strong>KISA DEPI VARY WÈ LI TONBE DEPALE ?</strong></p>

    <input type="text" id="answer" placeholder="Écris la réponse 💕">
    <br>
    <button onclick="checkAnswer()">Valider 💖</button>

    <div id="error"></div>
</div>

<div class="container" id="love">
    <div class="photo-card"><img src="photo1.jpg"><p>I love you ❤️</p></div>
    <div class="photo-card"><img src="photo2.jpg"><p>I love you ❤️</p></div>
    <div class="photo-card"><img src="photo3.jpg"><p>I love you ❤️</p></div>
</div>

<script>
const goodAnswer = "fraises";

function checkAnswer(){
    let user = document.getElementById("answer").value
        .toLowerCase()
        .trim()
        .replace(/\s+/g," ");

    if(user === goodAnswer){
        document.getElementById("question").style.display="none";
        document.getElementById("love").style.display="block";
        hearts();
        startSlideshow();
    } else {
        document.getElementById("error").innerText = "Eseye ankò bbm 💕";
    }
}

// Emoji animasyon
function hearts(){
    const emojis = ["💗","🤍","💋","💘"];
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
        h.style.left = Math.random()*100+"vw";
        h.style.fontSize = (20+Math.random()*25)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

// Diaporama otomatik
function startSlideshow(){
    const photos = document.querySelectorAll(".photo-card");
    let i = 0;

    function showNext(){
        photos.forEach(p=>{p.style.animation=""; p.style.opacity=0;}); // reset
        if(i >= photos.length) return; // fini tout
        const photo = photos[i];
        photo.style.animation = "show 2s forwards";
        i++;
        setTimeout(showNext, 2500); // chak foto 2.5s
    }

    showNext();
}
</script>

</body>
</html>
